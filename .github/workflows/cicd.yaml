name: CI/CD Pipeline

on:
  # ── Runs on every push to main
  push:
    branches: [ main ]

  # ── Manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:

  # ─────────────────────────────────────
  # JOB 1: SONARCLOUD CODE QUALITY
  # ─────────────────────────────────────
  sonarcloud:
    name: 🔍 SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────
  # JOB 2: SNYK SECURITY SCAN
  # ─────────────────────────────────────
  snyk:
    name: 🔒 Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Scan
        run: snyk code test --severity-threshold=high || true

  # ─────────────────────────────────────
  # JOB 3: DOCKER BUILD & PUSH
  # ─────────────────────────────────────
  docker:
    name: 🐳 Docker Build and Push
    runs-on: ubuntu-latest
    needs: [sonarcloud, snyk]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mywebpage:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mywebpage:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mywebpage:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mywebpage:${{ github.sha }}

  # ─────────────────────────────────────
  # JOB 4: DEPLOY TO STAGING
  # ─────────────────────────────────────
  deploy-staging:
    name: 🚧 Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: staging
      url: https://chandrud171989-collab.github.io/mywebpage-staging/
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Staging GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          destination_dir: staging
          commit_message: '🚧 Staging deploy - ${{ github.sha }}'

      - name: Print Staging URL
        run: |
          echo "✅ Staging deployed!"
          echo "🔗 URL: https://chandrud171989-collab.github.io/mywebpage/staging/"

  # ─────────────────────────────────────
  # JOB 5: LIGHTHOUSE PERFORMANCE TEST
  # ─────────────────────────────────────
  lighthouse:
    name: 🚦 Lighthouse Performance Test
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Wait for Staging to be Ready
        run: sleep 30

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://chandrud171989-collab.github.io/mywebpage/staging/
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3
          budgetPath: ./budget.json

      - name: Upload Lighthouse Report
        uses: actions/upload-artifact@v3
        with:
          name: lighthouse-report
          path: .lighthouseci/

  # ─────────────────────────────────────
  # JOB 6: DEPLOY TO PRODUCTION
  # ─────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: lighthouse
    environment:
      name: production
      url: https://chandrud171989-collab.github.io/mywebpage/
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Production GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          commit_message: '🚀 Production deploy - ${{ github.sha }}'

      - name: Print Production URL
        run: |
          echo "✅ Production deployed!"
          echo "🔗 URL: https://chandrud171989-collab.github.io/mywebpage/"