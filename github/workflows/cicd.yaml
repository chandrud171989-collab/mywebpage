name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

# ───────── LINT ─────────
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install || true

      - name: Run ESLint
        run: npx eslint . || true


# ───────── UNIT TEST ─────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install || true

      - name: Run Tests
        run: npm test || true


# ───────── DEPENDENCY CHECK ─────────
  dependency-check:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - run: npm install || true

      - name: Run npm audit
        run: npm audit --audit-level=high || true


# ───────── SONARCLOUD ─────────
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: dependency-check
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


# ───────── SNYK SECURITY ─────────
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: sonarcloud
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Code Scan
        run: snyk code test --severity-threshold=high || true


# ───────── DOCKER BUILD & PUSH ─────────
  docker:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: snyk
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mywebpage:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mywebpage:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mywebpage:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mywebpage:${{ github.sha }}


# ───────── DOCKER IMAGE SCAN (TRIVY) ─────────
  docker-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Scan Docker Image using Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/mywebpage:latest
          format: table
          exit-code: '0'


# ───────── ARTIFACT UPLOAD ─────────
  artifact:
    name: Upload Artifact
    runs-on: ubuntu-latest
    needs: docker-scan
    steps:
      - uses: actions/checkout@v3

      - name: Upload Website Files
        uses: actions/upload-artifact@v3
        with:
          name: website-files
          path: ./


# ───────── DEPLOY TO GITHUB PAGES ─────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: artifact
    steps:
      - uses: actions/checkout@v3

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./